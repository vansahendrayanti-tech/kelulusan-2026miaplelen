<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  text-align:center;
  color:#222;

  background:white;
  background-image:url('logo.png');
  background-repeat:repeat;
  background-size:150px;
}

/* HEADER */
.header {
  padding:30px;
}

/* BOX */
.box {
  background:rgba(255,255,255,0.95);
  max-width:400px;
  width:90%;
  margin:auto;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input {
  padding:12px;
  width:90%;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  padding:12px;
  width:90%;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

button:hover {
  background:#005ad1;
}

/* RESPONSIVE */
@media (max-width:600px){
  .header h1{font-size:20px;}
  .header p{font-size:14px;}
}
</style>
</head>

<body>

<div class="header">
  <h1>MI AL HIDAYAH PLELEN</h1>
  <p>Pengumuman Kelulusan 2026</p>
</div>

<div class="box">
  <h3>Masukkan NISN</h3>
  <input type="text" id="nisn" placeholder="Contoh: 3138840469">
  <br>
  <button onclick="go()">Cek Kelulusan</button>
</div>

<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
function go(){
  let nisn = document.getElementById("nisn").value;
  window.location.href = "hasil.html?nisn=" + nisn;
}

/* AUTO MUSIK HALUS */
let started=false;

document.addEventListener("click",()=>{
  if(!started){
    let musik=document.getElementById("musik");
    musik.volume=0;
    musik.play();

    let fade=setInterval(()=>{
      if(musik.volume<1){
        musik.volume+=0.05;
      }else{
        clearInterval(fade);
      }
    },200);

    started=true;
  }
});
</script>

</body>
</html>
