<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan 2026</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: white;
  overflow-x: hidden;

  background: #0f2027;
  background-image: url('logo.png');
  background-repeat: repeat;
  background-size: 120px;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(15,32,39,0.85);
  backdrop-filter: blur(5px);
  z-index: -1;
}

/* HEADER */
.header {
  padding: 30px;
  letter-spacing: 2px;
}

/* BOX INPUT */
.box {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  width: 360px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,255,255,0.2);
}

input {
  padding: 12px;
  width: 85%;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* KARTU */
.kartu {
  margin: 30px auto;
  width: 420px;
  background: rgba(255,255,255,0.95);
  color: black;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: fadeIn 1s;
}

.kartu img {
  width: 120px;
  border-radius: 10px;
}

.lulus {
  color: green;
  font-size: 22px;
  font-weight: bold;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* BALON */
.balon {
  position: fixed;
  bottom: -100px;
  width: 40px;
  height: 60px;
  border-radius: 50%;
  opacity: 0.6;
  animation: naik linear infinite;
}

@keyframes naik {
  from {transform: translateY(0);}
  to {transform: translateY(-120vh);}
}
</style>
</head>

<body>

<div class="header">
  <h1>MI AL HIDAYAH PLELEN</h1>
  <p>Pengumuman Kelulusan Tahun 2026</p>
</div>

<div class="box">
  <h3>Masukkan NISN</h3>
  <input type="text" id="nisn" placeholder="Contoh: 3138840469">
  <br>
  <button onclick="cek()">Cek Kelulusan</button>
</div>

<div id="hasil"></div>

<!-- MUSIK -->
<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const siswa = {
  "3138840469": {nama:"IKHFANUL SAPUTRA", foto:"1.jpg"},
  "3133721711": {nama:"INDHIRA MAY NOVI ZULIANTY", foto:"2.jpg"},
  "0149653962": {nama:"KAUMA SAFIYA SALSABILA RIZKY", foto:"3.jpg"},
  "3132128542": {nama:"KHAYLA ZAYAN UFAIRA", foto:"4.jpg"},
  "3142121807": {nama:"LATIFATUL HIKMAH", foto:"5.jpg"},
  "3145980864": {nama:"MICAYLA RAISYA PUTRI", foto:"6.jpg"},
  "3149874429": {nama:"MIFTAKHUL JANNAH", foto:"7.jpg"},
  "3136563204": {nama:"MUHAMMAD DWI PRASETYO", foto:"8.jpg"},
  "3147581861": {nama:"MUHAMMAD FATIH AADIL AL BARRAA", foto:"9.jpg"},
  "3142466117": {nama:"MUHAMMAD ILHAM MUNAZAL", foto:"10.jpg"},
  "3142612994": {nama:"MUHAMMAD VIRZA NUR HIDAYATULLOH", foto:"11.jpg"},
  "3135389357": {nama:"RAFAEL GALANG SAPUTRA", foto:"12.jpg"},
  "0146644118": {nama:"TAQIYA AZKATALIA", foto:"13.jpg"},
  "3144807093": {nama:"TIARA AULIA NISA", foto:"14.jpg"},
  "3138229405": {nama:"TIRTA NUR ZAMMI", foto:"15.jpg"},
  "3131510825": {nama:"YAHYA ANDIRJA SUSANTO", foto:"16.jpg"},
  "3138644160": {nama:"ZAHRA KURNIA", foto:"17.jpg"},
  "3133735700": {nama:"ZAHWA ISLAH SOFYA", foto:"18.jpg"}
};

function cek() {
  let input = document.getElementById("nisn").value;
  let hasil = document.getElementById("hasil");

  if (siswa[input]) {
    hasil.innerHTML = `
      <div class="kartu">
        <h2>SURAT KETERANGAN LULUS</h2>
        <img src="${siswa[input].foto}">
        <h2>${siswa[input].nama}</h2>
        <p>NISN: ${input}</p>
        <p class="lulus">🎉 DINYATAKAN LULUS 🎉</p>
        <p>Tahun Pelajaran 2025/2026</p>
      </div>
    `;

    confetti({
      particleCount: 150,
      spread: 80,
      origin: { y: 0.6 }
    });
  } else {
    hasil.innerHTML = `<p style="color:red;">NISN tidak ditemukan</p>`;
  }
}

/* MUSIK AUTO HALUS */
let started = false;

document.addEventListener("click", () => {
  if (!started) {
    let musik = document.getElementById("musik");
    musik.volume = 0;
    musik.play();

    let fade = setInterval(() => {
      if (musik.volume < 1) {
        musik.volume += 0.05;
      } else {
        clearInterval(fade);
      }
    }, 200);

    started = true;
  }
});

/* BALON CINEMATIC */
function buatBalon() {
  let balon = document.createElement("div");
  balon.className = "balon";

  let warna = ["#ff4d4d","#4da6ff","#ffff66","#66ff99","#ff66cc"];
  balon.style.background = warna[Math.floor(Math.random()*warna.length)];

  balon.style.left = Math.random()*100 + "vw";
  balon.style.animationDuration = (6 + Math.random()*6) + "s";

  document.body.appendChild(balon);

  setTimeout(()=>balon.remove(),12000);
}

setInterval(buatBalon, 600);
</script>

</body>
</html>
