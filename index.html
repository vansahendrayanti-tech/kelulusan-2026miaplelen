<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan MI Al Hidayah Plelen</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('bg.jpg') no-repeat center center/cover;
}

/* overlay tengah */
.overlay {
    background: rgba(255,255,255,0.88);
    margin: 120px 20px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(6px);
}

/* judul */
h2 {
    margin-bottom: 15px;
}

/* input */
input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    font-size: 16px;
}

/* tombol */
button {
    padding: 12px 25px;
    border: none;
    background: linear-gradient(45deg, #16a34a, #22c55e);
    color: white;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

/* animasi */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.7s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* foto */
img {
    width: 120px;
    border-radius: 12px;
    margin-top: 10px;
    animation: zoom 0.5s;
}

@keyframes zoom {
    from {transform: scale(0.7);}
    to {transform: scale(1);}
}

/* status */
.lulus {
    color: green;
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

/* confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: jatuh 3s linear;
}

@keyframes jatuh {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="overlay">

<h2>CEK KELULUSAN</h2>

<input type="text" id="nisn" placeholder="Masukkan NISN">
<br>
<button onclick="cek()">CEK</button>

<div id="hasil" class="fade"></div>

</div>

<script>

/* DATA SISWA */
const data = [
{nisn:"3138840469", nama:"IKHFANUL SAPUTRA", foto:"foto/1.jpg"},
{nisn:"3133721711", nama:"INDHIRA MAY NOVI ZULIANTY", foto:"foto/2.jpg"},
{nisn:"0149653962", nama:"KAUMA SAFIYA SALSABILA RIZKY", foto:"foto/3.jpg"},
{nisn:"3132128542", nama:"KHAYLA ZAYAN UFAIRA", foto:"foto/4.jpg"},
{nisn:"3142121807", nama:"LATIFATUL HIKMAH", foto:"foto/5.jpg"},
{nisn:"3145980864", nama:"MICAYLA RAISYA PUTRI", foto:"foto/6.jpg"},
{nisn:"3149874429", nama:"MIFTAKHUL JANNAH", foto:"foto/7.jpg"},
{nisn:"3136563204", nama:"MUHAMMAD DWI PRASETYO", foto:"foto/8.jpg"},
{nisn:"3147581861", nama:"MUHAMMAD FATIH AADIL AL BARRAA", foto:"foto/9.jpg"},
{nisn:"3142466117", nama:"MUHAMMAD ILHAM MUNAZAL", foto:"foto/10.jpg"},
{nisn:"3142612994", nama:"MUHAMMAD VIRZA NUR HIDAYATULLOH", foto:"foto/11.jpg"},
{nisn:"3135389357", nama:"RAFAEL GALANG SAPUTRA", foto:"foto/12.jpg"},
{nisn:"0146644118", nama:"TAQIYA AZKATALIA", foto:"foto/13.jpg"},
{nisn:"3144807093", nama:"TIARA AULIA NISA", foto:"foto/14.jpg"},
{nisn:"3138229405", nama:"TIRTA NUR ZAMMI", foto:"foto/15.jpg"},
{nisn:"3131510825", nama:"YAHYA ANDIRJA SUSANTO", foto:"foto/16.jpg"},
{nisn:"3138644160", nama:"ZAHRA KURNIA", foto:"foto/17.jpg"},
{nisn:"3133735700", nama:"ZAHWA ISLAH SOFYA", foto:"foto/18.jpg"}
];

/* CEK DATA */
function cek(){
    let input = document.getElementById("nisn").value.trim();
    let hasil = document.getElementById("hasil");

    hasil.classList.remove("show");

    let siswa = data.find(d => d.nisn === input);

    if(siswa){
        hasil.innerHTML = `
            <img src="${siswa.foto}">
            <h3>${siswa.nama}</h3>
            <div class="lulus">DINYATAKAN LULUS</div>
        `;

        setTimeout(() => {
            hasil.classList.add("show");
        }, 100);

        confetti();

    } else {
        hasil.innerHTML = "<b>Data tidak ditemukan</b>";
        hasil.classList.add("show");
    }
}

/* CONFETTI */
function confetti(){
    for(let i=0;i<30;i++){
        let div = document.createElement("div");
        div.className = "confetti";
        div.style.left = Math.random()*100+"vw";
        div.style.background = randomColor();
        document.body.appendChild(div);

        setTimeout(()=>div.remove(),3000);
    }
}

function randomColor(){
    const warna = ["red","blue","yellow","green","orange","pink"];
    return warna[Math.floor(Math.random()*warna.length)];
}

</script>

</body>
</html>
